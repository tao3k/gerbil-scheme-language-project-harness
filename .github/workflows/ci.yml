name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  native:
    name: Native Gerbil harness (${{ matrix.os }}, ${{ matrix.gerbil-label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gerbil-label: source-v0.18.2-4-gadd92248
            gerbil-ref: add922481cec81d05431db014bcb91b30485cf21
          - os: macos-latest
            gerbil-label: source-v0.18.2-4-gadd92248
            gerbil-ref: add922481cec81d05431db014bcb91b30485cf21
    env:
      GERBIL_REF: ${{ matrix.gerbil-ref }}
      GERBIL_PREFIX: ${{ github.workspace }}/.ci/gerbil/${{ matrix.gerbil-label }}
      GERBIL_SRC: ${{ github.workspace }}/.ci/gerbil-src/${{ matrix.gerbil-label }}
    steps:
      - name: Checkout harness
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            git \
            jq \
            libsqlite3-dev \
            libssl-dev \
            openssl \
            sqlite3 \
            zlib1g-dev

      - name: Restore Homebrew cache
        if: runner.os == 'macOS'
        id: homebrew-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-gerbil-source-deps-v3
          restore-keys: |
            homebrew-${{ runner.os }}-${{ runner.arch }}-gerbil-source-deps-

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew unlink gambit-scheme || true
          brew unlink ghostscript || true
          brew install gcc jq openssl sqlite zlib

      - name: Select macOS Gerbil compiler
        if: runner.os == 'macOS'
        run: |
          gcc_prefix="$(brew --prefix gcc)"
          gcc_bin="$(
            find "$gcc_prefix/bin" -maxdepth 1 -type f -name 'gcc-[0-9]*' \
              | awk -F- '{print $NF "\t" $0}' \
              | sort -n \
              | tail -n 1 \
              | cut -f2-
          )"
          test -n "$gcc_bin"
          test -x "$gcc_bin"
          echo "GERBIL_GCC=$gcc_bin" >> "$GITHUB_ENV"
          "$gcc_bin" --version

      - name: Save Homebrew cache
        if: runner.os == 'macOS' && steps.homebrew-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-gerbil-source-deps-v3

      - name: Restore Gerbil install cache
        id: gerbil-cache
        uses: actions/cache/restore@v4
        with:
          path: .ci/gerbil/${{ matrix.gerbil-label }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ matrix.gerbil-ref }}
          restore-keys: |
            gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-

      - name: Build Gerbil
        if: steps.gerbil-cache.outputs.cache-hit != 'true'
        run: |
          build_cores() {
            nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2
          }
          mkdir -p "$(dirname "$GERBIL_SRC")" "$(dirname "$GERBIL_PREFIX")"
          rm -rf "$GERBIL_SRC" "$GERBIL_PREFIX"
          git clone https://git.cons.io/mighty-gerbils/gerbil "$GERBIL_SRC"
          cd "$GERBIL_SRC"
          git checkout "$GERBIL_REF"
          ./configure --prefix="$GERBIL_PREFIX"
          echo "(def (gerbil-version-string) \"ci-${GERBIL_REF}\")" > src/gerbil/runtime/version.ss
          . ./build-env.sh
          for target in prepare gambit boot-gxi stage0 stage1 stdlib libgerbil lang r7rs-large srfi tools; do
            GERBIL_BUILD_CORES="$(build_cores)" ./src/build.sh "$target"
          done
          ./install.sh

      - name: Save Gerbil install cache
        if: steps.gerbil-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ci/gerbil/${{ matrix.gerbil-label }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ matrix.gerbil-ref }}

      - name: Activate Gerbil
        run: |
          echo "$GERBIL_PREFIX/bin" >> "$GITHUB_PATH"
          "$GERBIL_PREFIX/bin/gxi" --version
          "$GERBIL_PREFIX/bin/gxpkg" version
          "$GERBIL_PREFIX/bin/gxi" -e '(displayln "gerbil-ready")'
          "$GERBIL_PREFIX/bin/gxpkg" list

      - name: Restore Gerbil package dependency cache
        id: gerbil-pkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ matrix.gerbil-ref }}-${{ hashFiles('gerbil.pkg') }}
          restore-keys: |
            gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ matrix.gerbil-ref }}-

      - name: Install Gerbil package dependencies from gerbil.pkg
        run: |
          mkdir -p "$HOME/.gerbil/pkg"
          gxpkg dir --add git.cons.io/mighty-gerbils/gerbil-directory
          gxpkg deps --install
          gxpkg list

      - name: Save Gerbil package dependency cache
        if: steps.gerbil-pkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ matrix.gerbil-ref }}-${{ hashFiles('gerbil.pkg') }}

      - name: Run Gerbil test suites
        run: |
          export GERBIL_LOADPATH="$PWD/src:$PWD/t"
          gxtest t/...

      - name: Run harness check
        run: |
          export GERBIL="$(command -v gxi)"
          GERBIL_LOADPATH="$PWD/src" gxpkg env gxi bin/gerbil-scheme-harness.ss check --full .

      - name: Run harness verification bench
        run: |
          export GERBIL="$(command -v gxi)"
          bench_output="$(mktemp)"
          if ! GERBIL_LOADPATH="$PWD/src" gxpkg env gxi bin/gerbil-scheme-harness.ss bench --json --iterations 1 --max-total-ms 60000 --max-interface-ms 500 . > "$bench_output"; then
            cat "$bench_output"
            exit 1
          fi
          bench="$(cat "$bench_output")"
          echo "$bench"
          echo "$bench" | jq -e '
            .schemaId == "agent.semantic-protocols.gerbil-scheme-harness-bench" and
            .status == "pass" and
            .maxInterfaceMs == 500 and
            (.totalMs | type == "number") and
            (.slowestBenchmark.durationMs | type == "number") and
            (.benchmarks | length) == 5 and
            all(.benchmarks[]; (.durationMs | type == "number") and .durationMs >= 0)
          '

      - name: Verify package extension packet
        run: |
          export GERBIL="$(command -v gxi)"
          packet="$(GERBIL_LOADPATH="$PWD/src" gxpkg env gxi bin/gerbil-scheme-harness.ss search prime --json .)"
          echo "$packet" | jq -e '
            .projectPackage.fields.packageManager == "gxpkg" and
            .projectPackage.dependencies == ["git.cons.io/mighty-gerbils/gerbil-poo"] and
            .extensions[0].name == "poo" and
            .extensions[0].activation == "gerbil.pkg" and
            .extensions[0].dependencyMode == "required" and
            .extensions[0].packageManager == "gxpkg"
          '

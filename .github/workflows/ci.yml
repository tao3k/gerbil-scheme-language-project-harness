name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  native:
    name: Native Gerbil harness (${{ matrix.os }}, ${{ matrix.gerbil-label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gerbil-label: pinned
            gerbil-ref: add922481cec81d05431db014bcb91b30485cf21
    env:
      GERBIL_REF: ${{ matrix.gerbil-ref }}
      GERBIL_PREFIX: ${{ github.workspace }}/.ci/gerbil/${{ matrix.gerbil-label }}
      GERBIL_SRC: ${{ github.workspace }}/.ci/gerbil-src/${{ matrix.gerbil-label }}
    steps:
      - name: Checkout harness
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            git \
            jq \
            libsqlite3-dev \
            libssl-dev \
            openssl \
            sqlite3 \
            zlib1g-dev

      - name: Cache Gerbil install
        id: gerbil-cache
        uses: actions/cache@v4
        with:
          path: .ci/gerbil/${{ matrix.gerbil-label }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ matrix.gerbil-ref }}
          restore-keys: |
            gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-

      - name: Build Gerbil
        if: steps.gerbil-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$(dirname "$GERBIL_SRC")" "$(dirname "$GERBIL_PREFIX")"
          rm -rf "$GERBIL_SRC" "$GERBIL_PREFIX"
          git clone https://git.cons.io/mighty-gerbils/gerbil "$GERBIL_SRC"
          cd "$GERBIL_SRC"
          git checkout "$GERBIL_REF"
          ./configure --prefix="$GERBIL_PREFIX"
          echo "(def (gerbil-version-string) \"ci-${GERBIL_REF}\")" > src/gerbil/runtime/version.ss
          . ./build-env.sh
          for target in prepare gambit boot-gxi stage0 stage1 stdlib libgerbil lang r7rs-large srfi tools; do
            GERBIL_BUILD_CORES="$(nproc)" ./src/build.sh "$target"
          done
          ./install.sh

      - name: Activate Gerbil
        run: |
          echo "$GERBIL_PREFIX/bin" >> "$GITHUB_PATH"
          "$GERBIL_PREFIX/bin/gxi" -e '(displayln "gerbil-ready")'
          "$GERBIL_PREFIX/bin/gxpkg" list

      - name: Install Gerbil package dependencies from gerbil.pkg
        run: |
          gxpkg deps --install

      - name: Run Gerbil test suites
        run: |
          export GERBIL_LOADPATH="$PWD/src:$PWD/test"
          gxtest -q test/...

      - name: Run harness check
        run: |
          export GERBIL="$(command -v gxi)"
          ./bin/gerbil-scheme-harness check --full .

      - name: Verify package extension packet
        run: |
          export GERBIL="$(command -v gxi)"
          packet="$(./bin/gerbil-scheme-harness search prime --json .)"
          echo "$packet" | jq -e '
            .projectPackage.fields.packageManager == "gxpkg" and
            .projectPackage.dependencies == ["git.cons.io/mighty-gerbils/gerbil-poo"] and
            .extensions[0].name == "poo" and
            .extensions[0].activation == "gerbil.pkg" and
            .extensions[0].dependencyMode == "required" and
            .extensions[0].packageManager == "gxpkg"
          '
